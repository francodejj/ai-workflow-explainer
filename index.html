<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>AI Workflow Explainer</title>
    <style>
        body { font-family: Arial, sans-serif; background: #f7f7f7; padding: 40px; }
        .container { max-width: 800px; margin: auto; background: white; padding: 30px; border-radius: 12px; }
        h1 { margin-top: 0; }
        textarea { width: 100%; height: 120px; padding: 10px; }
        button { padding: 12px 20px; margin-top: 10px; font-size: 16px; cursor: pointer; }
        #output { margin-top: 30px; white-space: pre-wrap; background: #fafafa; padding: 20px; border-radius: 10px; }
    </style>
</head>
<body>
    <div class="container">
        <h1>AI Workflow Explainer</h1>
        <p>Enter any business process and the AI will break it down into steps, bottlenecks, and automation opportunities.</p>

        <textarea id="input" placeholder="e.g., insurance claims workflow"></textarea>
        <button onclick="run()">Explain Workflow</button>

        <div id="output"></div>
    </div>

<script>
    async function run() {
        const userInput = document.getElementById("input").value;
        const output = document.getElementById("output");
        output.innerHTML = "Analyzing workflow...";

        const prompt = `
You are an AI workflow analyst. The user provided this process: "${userInput}"

1. Restate the process clearly.
2. Break it into 5–10 steps with purpose, inputs, outputs, and who performs each step.
3. Identify bottlenecks.
4. Identify automation opportunities.
5. Provide an optimized workflow.

Return the answer in clean, readable sections.
`;

        const response = await fetch("https://workflow-explainer.francodejj.workers.dev/", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ prompt })
        });

        const data = await response.json();
        output.innerHTML = data.text || "No response received.";
    }
</script>
</body>
</html>
